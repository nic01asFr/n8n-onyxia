apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.fullname" . }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
  annotations:
    # Garde le secret entre désinstallations : N8N_ENCRYPTION_KEY irrécupérable sinon.
    helm.sh/resource-policy: keep
type: Opaque
data:
  encryptionKey: {{ include "n8n.encryptionKey" . | b64enc | quote }}
  {{- if eq .Values.database.type "postgresdb" }}
  postgresPassword: {{ .Values.database.postgres.password | b64enc | quote }}
  {{- end }}
