apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.fullname" . }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
  annotations:
    # Garde le secret entre désinstallations : N8N_ENCRYPTION_KEY irrécupérable sinon.
    helm.sh/resource-policy: keep
type: Opaque
data:
  encryptionKey: {{ include "n8n.encryptionKey" . | b64enc | quote }}
  ownerEmail: {{ .Values.owner.email | b64enc | quote }}
  ownerPassword: {{ include "n8n.ownerPassword" . | b64enc | quote }}
  ownerFirstName: {{ .Values.owner.firstName | b64enc | quote }}
  ownerLastName: {{ .Values.owner.lastName | b64enc | quote }}
  # Rempli par le Job post-install (provisioning-job.yaml).
  # Conservé entre upgrades via le helper n8n.apiKey + lookup.
  N8N_API_KEY: {{ include "n8n.apiKey" . | b64enc | quote }}
  {{- if eq .Values.database.type "postgresdb" }}
  postgresPassword: {{ .Values.database.postgres.password | b64enc | quote }}
  {{- end }}
